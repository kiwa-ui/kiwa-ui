# Kiwa UI registry — example wrangler config.
#
# Copy this to `wrangler.toml` and fill in your own Cloudflare and Lemon
# Squeezy identifiers if you want to self-host a clone of this registry.
# The official Kiwa UI registry is hosted by Tossell Web Solutions Limited
# at https://registry.kiwaui.com — most contributors do not need to deploy
# their own.

name = "kiwa-ui-registry"
main = "src/index.ts"
compatibility_date = "2024-01-01"
account_id = "YOUR_CLOUDFLARE_ACCOUNT_ID"

routes = [
  { pattern = "registry.example.com", custom_domain = true }
]

[vars]
ENVIRONMENT = "production"
LEMON_SQUEEZY_PRO_VARIANT_ID = "YOUR_LEMON_SQUEEZY_VARIANT_ID"

[[d1_databases]]
binding = "DB"
database_name = "kiwa-ui-licenses"
database_id = "YOUR_D1_DATABASE_ID"

[[kv_namespaces]]
binding = "CACHE"
id = "YOUR_KV_NAMESPACE_ID"
